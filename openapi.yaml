openapi: 3.1.0

info:
  title: Crowd Transcription Fixer API
  version: 1.0.0
  description: |
    REST API for a crowd-sourced subtitle correction service.

    **How it works**
    1. Clients browse available audios.
    2. Clients claim an audio by creating a task (supplying `media_id`).
    3. The client fetches task details (media link + subtitles) and corrects the text.
    4. The client submits the corrected text.

servers:
  - url: /api/v1/crowd
    description: Versioned API root

tags:
  - name: audios
    description: Browse audio assets
  - name: tasks
    description: Claim, manage, and submit editing tasks

# ---------------------------------------------------------------------------
# Reusable components
# ---------------------------------------------------------------------------
components:
  parameters:
    audioId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Audio ID

    taskId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Task ID

    limitParam:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

    offsetParam:
      name: offset
      in: query
      schema:
        type: integer
        minimum: 0
        default: 0

  schemas:

    Audio:
      type: object
      required: [id]
      properties:
        id:
          type: string
          description: Audio asset ID.
        url:
          type: string
          format: uri
          nullable: true
          description: Direct URL to the audio file.
        maggid_description:
          type: string
          nullable: true
        massechet_name:
          type: string
          nullable: true
        daf_name:
          type: string
          nullable: true
        duration:
          type: integer
          nullable: true
          description: Duration in seconds.

    AudioList:
      type: object
      required: [data, total, offset, limit]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Audio'
        total:
          type: integer
          description: Total matching audios (for pagination).
        offset:
          type: integer
        limit:
          type: integer

    TaskStatus:
      type: string
      enum: [PENDING, STARTED, FINISHED]

    Task:
      type: object
      required: [task_id, media_id, status]
      properties:
        task_id:
          type: string
        media_id:
          type: string
        status:
          $ref: '#/components/schemas/TaskStatus'

    TaskCreated:
      type: object
      required: [task_id]
      properties:
        task_id:
          type: string

    TaskDetail:
      type: object
      required: [media_link, subtitles]
      properties:
        media_link:
          type: string
          format: uri
          description: URL to the audio file for playback.
        subtitles:
          type: string
          description: Original subtitle text for the audio.

    TaskEnrichment:
      type: object
      required: [task_id, media_id]
      properties:
        task_id:
          type: string
        media_id:
          type: string
        text:
          type: string
          nullable: true
          description: Enriched or corrected text, if available.

    Error:
      type: object
      required: [error, code]
      properties:
        error:
          type: string
          description: Human-readable error message.
          example: "Audio not found"
        code:
          type: string
          description: Machine-readable error code.
          example: "NOT_FOUND"

  responses:
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "Audio not found"
            code: "NOT_FOUND"

    Conflict:
      description: The resource is in a state that prevents this operation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

# ---------------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------------
paths:

  # ---- Audios --------------------------------------------------------------

  /audios:
    get:
      operationId: listAudios
      summary: List audio assets
      tags: [audios]
      parameters:
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/offsetParam'
      responses:
        '200':
          description: Paginated list of audios.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AudioList'

  /audios/{id}:
    get:
      operationId: getAudio
      summary: Get a single audio
      tags: [audios]
      parameters:
        - $ref: '#/components/parameters/audioId'
      responses:
        '200':
          description: Audio details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Audio'
        '404':
          $ref: '#/components/responses/NotFound'

  # ---- Tasks ---------------------------------------------------------------

  /tasks:
    post:
      operationId: createTask
      summary: Claim an audio
      description: |
        Creates a task for the given `media_id`. Fails with `409` if the audio
        is already claimed.
      tags: [tasks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [media_id]
              properties:
                media_id:
                  type: string
                  description: ID of the audio to claim.
      responses:
        '201':
          description: Task created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskCreated'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /tasks/{id}:
    get:
      operationId: getTask
      summary: Get task details
      description: Returns the media link and subtitles for the task.
      tags: [tasks]
      parameters:
        - $ref: '#/components/parameters/taskId'
      responses:
        '200':
          description: Task details including media link and subtitles.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskDetail'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      operationId: deleteTask
      summary: Delete a task
      description: Removes the task and releases the audio lock.
      tags: [tasks]
      parameters:
        - $ref: '#/components/parameters/taskId'
      responses:
        '204':
          description: Task deleted successfully.
        '404':
          $ref: '#/components/responses/NotFound'

  /tasks/{id}/enrich:
    get:
      operationId: enrichTask
      summary: Get enriched task data
      description: Returns enrichment data for the task, including any corrected text.
      tags: [tasks]
      parameters:
        - $ref: '#/components/parameters/taskId'
      responses:
        '200':
          description: Task enrichment data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskEnrichment'
        '404':
          $ref: '#/components/responses/NotFound'

  /tasks/{id}/submit:
    post:
      operationId: submitTask
      summary: Submit corrected text
      description: Submits the corrected subtitle text for the task.
      tags: [tasks]
      parameters:
        - $ref: '#/components/parameters/taskId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text:
                  type: string
                  description: The corrected subtitle text.
      responses:
        '204':
          description: Submission accepted.
        '404':
          $ref: '#/components/responses/NotFound'
